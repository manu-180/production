name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: '10.33.0'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/conductor-web:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/conductor-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/conductor-worker:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/conductor-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.version.outputs.version }}^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --format="%h %s" ${{ steps.version.outputs.version }})
          else
            CHANGELOG=$(git log --oneline --format="%h %s" ${PREV_TAG}..${{ steps.version.outputs.version }})
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker Images
            - `ghcr.io/${{ github.repository }}/conductor-web:${{ steps.version.outputs.version }}`
            - `ghcr.io/${{ github.repository }}/conductor-worker:${{ steps.version.outputs.version }}`

            ## Commits
            ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false
